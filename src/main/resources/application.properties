# Application
spring.application.name=mobileprepaid
server.port=8080

# ================== MYSQL DATABASE ==================
spring.datasource.url=jdbc:mysql://localhost:3306/mobileprepaid?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Kishore@1002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

